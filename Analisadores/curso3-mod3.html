<!DOCTYPE html>
<html lang="pt-BR" data-tema="escuro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo 3 · Desafio 3D — Curso 3 — Farol</title>
  <meta name="description" content="Ordene a Análise de Lucratividade em 3D: clique os blocos do maior para o menor faturamento.">
  <script>try { document.documentElement.dataset.tema = localStorage.getItem("farol:tema") || "escuro"; } catch (e) {}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../farol.css">
</head>
<body data-pagina="curso3-mod3" data-raiz="../">
  <a class="pular-link" href="#conteudo">Pular para o conteúdo</a>
  <main id="conteudo" class="container estreito secao pilha">
    <header class="pilha revela">
      <span class="selo">Curso 3 · Módulo 3 de 4</span>
      <h1>Desafio 3D</h1>
      <p class="suave">Cada bloco é um produto; a <strong>altura</strong> é o faturamento.
        Classifique clicando do <strong>maior para o menor</strong>.</p>
    </header>
    <section class="revela">
      <div class="palco" id="palco">
        <div class="hud">
          <span class="selo" id="hud-prog">0 / 5</span>
          <span class="selo" id="hud-info">Carregando…</span>
        </div>
        <div class="palco-aviso" id="aviso"><p>Preparando o ambiente 3D…</p></div>
      </div>
      <p class="feedback" id="fb" role="status" aria-live="polite"></p>
    </section>
    <nav class="flex revela" style="justify-content:space-between">
      <a class="botao botao-fantasma" href="curso3-mod2.html">← Módulo 2</a>
      <a class="botao" href="curso3-mod4.html">Módulo 4: Análise de Resultados →</a>
    </nav>
  </main>
  <footer class="rodape"><div class="container">Farol · Curso 3 · Módulo 3 de 4</div></footer>
  <script src="../farol-versao.js"></script>
  <script src="../farol-core.js"></script>
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
  <script>
    "use strict";
    var CURSO = "curso3", MOD = "c3m3";
    var palco = document.getElementById("palco"), aviso = document.getElementById("aviso");
    var hudProg = document.getElementById("hud-prog"), hudInfo = document.getElementById("hud-info");
    var fb = document.getElementById("fb");
    var reduzido = matchMedia("(prefers-reduced-motion: reduce)").matches;

    var ITENS = [
      { id: "p1", nome: "Notebook Pro", valor: 4200 },
      { id: "p2", nome: "Cadeira Gamer", valor: 1800 },
      { id: "p3", nome: "Teclado Mecânico", valor: 950 },
      { id: "p4", nome: "Mousepad", valor: 120 },
      { id: "p5", nome: "Caneta", valor: 8 }
    ];
    var expectedSeq = ITENS.slice().sort(function (a, b) { return b.valor - a.valor; }).map(function (i) { return i.id; });

    if (Farol.estaModuloConcluido(CURSO, MOD)) mostrar("ok", "Você já concluiu este desafio. Pode jogar de novo.");

    if (typeof THREE === "undefined") { fallback("Não foi possível carregar o Three.js. O resto funciona normalmente."); }
    else { iniciar3D(THREE); }

    function iniciar3D(THREE) {
      var renderer;
      try { renderer = new THREE.Gráficos 3DRenderer({ antialias: true, alpha: true }); }
      catch (e) { fallback("Sem Gráficos 3D disponível."); return; }
      var w = palco.clientWidth, h = palco.clientHeight;
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); renderer.setSize(w, h);
      aviso.classList.add("esconder"); palco.appendChild(renderer.domElement);
      hudInfo.textContent = "Clique do MAIOR para o menor";

      var cena = new THREE.Scene();
      var cam = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
      cam.position.set(0, 4.5, 9); cam.lookAt(0, 1, 0);
      cena.add(new THREE.AmbientLight(0xffffff, 0.6));
      var sol = new THREE.DirectionalLight(0xffffff, 1.1); sol.position.set(5, 10, 7); cena.add(sol);
      var chao = new THREE.Mesh(new THREE.CircleGeometry(9, 48), new THREE.MeshStandardMaterial({ color: 0x1a2233, roughness: 0.95 }));
      chao.rotation.x = -Math.PI / 2; cena.add(chao);

      var grupo = new THREE.Group(); cena.add(grupo);
      var maxV = Math.max.apply(null, ITENS.map(function (i) { return i.valor; }));
      var posX = embaralhar([-4, -2, 0, 2, 4]);
      var CB = 0x4f7cff, COK = 0x3ddc97, CE = 0xff5d5d; var blocos = [];
      ITENS.forEach(function (item, i) {
        var hh = 0.5 + Math.sqrt(item.valor / maxV) * 4;
        var mat = new THREE.MeshStandardMaterial({ color: CB, roughness: 0.4, metalness: 0.1 });
        var bl = new THREE.Mesh(new THREE.BoxGeometry(1.3, hh, 1.3), mat);
        bl.position.set(posX[i], hh / 2, 0);
        bl.userData = { id: item.id, nome: item.nome, valor: item.valor, travado: false };
        grupo.add(bl); blocos.push(bl);
      });

      var ray = new THREE.Raycaster(), pt = new THREE.Vector2(), seq = 0, hover = null;
      function coords(e) { var r = renderer.domElement.getBoundingClientRect(); pt.x = ((e.clientX - r.left) / r.width) * 2 - 1; pt.y = -((e.clientY - r.top) / r.height) * 2 + 1; }
      function alvo() { ray.setFromCamera(pt, cam); var h = ray.intersectObjects(blocos, false); return h.length ? h[0].object : null; }

      renderer.domElement.addEventListener("pointermove", function (e) {
        coords(e); var o = alvo();
        if (hover && hover !== o && !hover.userData.travado) hover.material.emissive.setHex(0);
        if (o && !o.userData.travado) { o.material.emissive.setHex(0x16243f); hudInfo.textContent = o.userData.nome + " · R$ " + o.userData.valor.toLocaleString("pt-BR"); renderer.domElement.style.cursor = "pointer"; }
        else if (!o) { hudInfo.textContent = "Clique do MAIOR para o menor"; renderer.domElement.style.cursor = "default"; }
        hover = o;
      });

      renderer.domElement.addEventListener("pointerdown", function (e) {
        coords(e); var o = alvo(); if (!o || o.userData.travado) return;
        if (o.userData.id === expectedSeq[seq]) {
          o.userData.travado = true; o.material.color.setHex(COK); o.material.emissive.setHex(0);
          seq++; hudProg.textContent = seq + " / " + ITENS.length;
          if (seq === expectedSeq.length) {
            hudInfo.textContent = "Análise de Lucratividade classificada! ✓";
            mostrar("ok", "Perfeito! Módulo concluído.");
            Farol.marcarModuloConcluido(CURSO, MOD);
          }
        } else {
          blocos.forEach(function (b) { b.material.color.setHex(CE); });
          mostrar("erro", "Ordem incorreta — recomece pelo maior.");
          setTimeout(function () { blocos.forEach(function (b) { if (!b.userData.travado) b.material.color.setHex(CB); }); }, 450);
          seq = 0; hudProg.textContent = "0 / " + ITENS.length;
          blocos.forEach(function (b) { b.userData.travado = false; b.material.color.setHex(CB); });
        }
      });

      (function animar() { if (!reduzido) grupo.rotation.y += 0.0025; renderer.render(cena, cam); requestAnimationFrame(animar); })();
      new ResizeObserver(function () { var ww = palco.clientWidth, hh = palco.clientHeight; renderer.setSize(ww, hh); cam.aspect = ww / hh; cam.updateProjectionMatrix(); }).observe(palco);
    }

    function embaralhar(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
    function mostrar(t, m) { fb.textContent = m; fb.className = "feedback mostrar " + t; }
    function fallback(msg) {
      aviso.classList.remove("esconder"); hudInfo.textContent = "Modo alternativo";
      aviso.innerHTML = "<div class='pilha'><p>" + msg + "</p><p class='suave'>Sem problema: conclua manualmente.</p><button class='botao' id='btn-m'>Concluir módulo</button></div>";
      document.getElementById("btn-m").addEventListener("click", function () { Farol.marcarModuloConcluido(CURSO, MOD); mostrar("ok", "Concluído no modo alternativo."); this.disabled = true; });
    }
    Farol.initReveal();
  </script>
</body>
</html>
